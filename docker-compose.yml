services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jex
      POSTGRES_USER: jex
      POSTGRES_PASSWORD: jexpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jex"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    env_file: ./apps/api/.env

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: ./apps/web/.env

volumes:
  pgdata:
