services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jex
      POSTGRES_USER: jex
      POSTGRES_PASSWORD: jexpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jex"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    env_file: ./apps/api/.env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    env_file: ./apps/web/.env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
